<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tambah Teks Depan TXT</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2>Tambah Teks di Depan Setiap Baris</h2>

  <input type="file" id="fileInput" accept=".txt">

  <textarea id="textArea" placeholder="Isi file akan tampil di sini..."></textarea>

  <input type="text" id="prefixInput" placeholder="Masukkan teks (contoh: +62)">

  <button onclick="processText()">Proses & Download</button>
</div>

<script src="script.js"></script>
</body>
</html>
